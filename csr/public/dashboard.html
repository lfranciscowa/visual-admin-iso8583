<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Admin — Terminal ISO 8583</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-main:   #2563eb;
            --blue-pale:   #eff6ff;
            --text-dark:   #1e1b4b;
            --text-muted:  #64748b;
            --border:      #e2e8f0;
            --bg:          #f8f7ff;
            --white:       #ffffff;
            --sans:        'Sora', sans-serif;
            --mono:        'IBM Plex Mono', monospace;
            --danger:      #e11d48;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR ESTRUCTURA */
        .sidebar {
            width: 360px;
            min-width: 360px;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-header .dot { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: var(--blue-main); 
            box-shadow: 0 0 0 4px var(--blue-pale);
        }
        .sidebar-header h2 { 
            font-size: 14px; font-weight: 700; color: var(--text-dark); 
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .sidebar-body { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            flex: 1; 
            overflow-y: auto; 
        }

        /* FORMULARIO Y CAMPOS */
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input[type="text"], select {
            width: 100%;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            outline: none;
            transition: all .2s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px var(--blue-pale);
        }

        .mti-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .mti-option {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; cursor: pointer;
            transition: .2s; text-align: left;
        }
        .mti-option.active { border-color: var(--blue-main); background: var(--blue-pale); }
        .mti-option .code { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--blue-main); }
        .mti-option .desc { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

        /* BITMAP */
        .sidebar-bitmap {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .bitmap-grid-mini { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; }
        .bit-cell {
            aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 8px; font-weight: 700; background: #fff; color: #cbd5e1;
            border: 1px solid #e2e8f0;
        }
        .bit-cell.active { background: var(--blue-main); color: white; border-color: var(--blue-main); }

        /* BOTONES ACCIÓN */
        .btn-execute {
            background: var(--blue-main); color: white; border: none; width: 100%;
            padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2); transition: .2s;
        }
        .btn-execute:hover { background: #1d4ed8; transform: translateY(-1px); }

        .logout-container {
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .btn-logout {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px; background: #fff1f2; color: var(--danger);
            border: 1px solid #fecdd3; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: .2s; font-size: 13px;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* MAIN VIEW */
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-topbar { padding: 18px 30px; border-bottom: 1px solid var(--border); background: var(--white); }
        .tab-content { flex: 1; overflow-y: auto; padding: 24px; }

        .result-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .de-table { width: 100%; border-collapse: collapse; }
        .de-table th { background: #f8fafc; font-size: 10px; color: #94a3b8; text-align: left; padding: 12px 20px; }
        .de-table td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
        .de-row-critical { background-color: var(--blue-pale) !important; font-weight: 600; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="dot"></div>
        <h2>PARAMETROS</h2>
    </div>

    <div class="sidebar-body">
        <div class="field">
            <span class="field-label">ID Transacción</span>
            <input type="text" id="idtx" placeholder="ID de la trama..." maxlength="32">
        </div>

        <div class="field">
            <span class="field-label">NODO</span>
            <select id="nodx" onchange="onNodoChange()">
                <option value="">— Seleccionar nodo —</option>
                <option value="0146">0146</option>
                <option value="0401">0401</option>
                <option value="0402">0402</option>
                <option value="EVERTC">EVERTC</option>
                <option value="NAIGUATA">NAIGUATA</option>
            </select>
        </div>

        <div class="field">
            <span class="field-label">Dirección (MODX)</span>
            <div class="mti-grid">
                <button class="mti-option active" id="modxINP" onclick="selectModx(this,'INP')">
                    <div class="code">INP</div>
                    <div class="desc">Entrada</div>
                </button>
                <button class="mti-option" id="modxOUT" onclick="selectModx(this,'OUT')">
                    <div class="code">OUT</div>
                    <div class="desc">Salida</div>
                </button>
            </div>
            <input type="hidden" id="modx" value="INP">
        </div>

        <div class="field">
            <span class="field-label">Bitmap</span>
            <div class="sidebar-bitmap">
                <div class="bitmap-grid-mini" id="bitmapGrid"></div>
            </div>
        </div>

        <button class="btn-execute" onclick="ejecutar()">▶ EJECUTAR TRARPUT</button>
    </div>

    <div class="logout-container">
        <button class="btn-logout" onclick="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
            Cerrar Sesión
        </button>
    </div>
</div>

<div class="main-view">
    <div class="main-topbar">
        <span style="font-size: 13px; font-weight: 600;">Visual Admin › Trama ISO 8583</span>
    </div>

    <div class="tab-content">
        <div id="emptyState" style="text-align: center; margin-top: 100px; color: var(--text-muted);">
            <p>Esperando ejecución...</p>
        </div>
        <div id="resultContent" style="display:none">
            <div class="result-card">
                <table class="de-table">
                    <thead><tr><th>DE#</th><th>Nombre</th><th>Tipo</th><th>Valor</th></tr></thead>
                    <tbody id="deTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Inicializar Bitmap
    function initBitmap(size = 64) {
        const grid = document.getElementById('bitmapGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= size; i++) {
            grid.insertAdjacentHTML('beforeend', `<div class="bit-cell" id="bit-${i}">${i}</div>`);
        }
    }

    function selectModx(btn, val) {
        document.querySelectorAll('.mti-option').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('modx').value = val;
    }

    function onNodoChange() { /* Lógica de cambio de nodo */ }

    async function ejecutar() {
        const idtx = document.getElementById('idtx').value;
        const nodx = document.getElementById('nodx').value;
        const modx = document.getElementById('modx').value;

        if(!idtx || !nodx) return alert("Faltan parámetros");

        try {
            // AJUSTE: Usamos ruta relativa para que funcione en Render
            const res = await fetch('/api/ejecutar-trarput', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ idtx, nodx, modx })
            });
            const data = await res.json();
            
            if(data.ok) {
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('resultContent').style.display = 'block';
                const tbody = document.getElementById('deTableBody');
                tbody.innerHTML = '';
                
                // Pintar tabla y activar bits...
                data.des.forEach(de => {
                    const critical = (de.num == 39 || de.num == 3) ? 'class="de-row-critical"' : '';
                    tbody.innerHTML += `<tr ${critical}><td>DE ${de.num}</td><td>${de.nombre}</td><td>${de.tipo}</td><td>${de.valor}</td></tr>`;
                    const bit = document.getElementById(`bit-${de.num}`);
                    if(bit) bit.classList.add('active');
                });
            }
        } catch(e) { alert("Error de conexión"); }
    }

    function cerrarSesion() {
        if(confirm("¿Deseas cerrar la sesión?")) {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    }

    document.addEventListener('DOMContentLoaded', () => initBitmap(64));
</script>
</body>
</html>
