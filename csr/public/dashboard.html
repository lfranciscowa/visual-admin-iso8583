<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Admin — Terminal ISO 8583</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-main:   #2563eb;
            --blue-pale:   #eff6ff;
            --text-dark:   #1e1b4b;
            --text-muted:  #64748b;
            --border:      #e2e8f0;
            --bg:          #f8f7ff;
            --white:       #ffffff;
            --sans:        'Sora', sans-serif;
            --mono:        'IBM Plex Mono', monospace;
            --danger:      #e11d48;
            --success:     #16a34a;
            --success-pale:#dcfce7;
            --warning:     #d97706;
            --warning-pale:#fef3c7;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center; gap: 12px;
        }
        .sidebar-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue-main); box-shadow: 0 0 0 4px var(--blue-pale); }
        .sidebar-header h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .sidebar-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; flex: 1; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }

        input[type="text"], select {
            width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 8px;
            padding: 9px 12px; font-size: 13px; outline: none; transition: all .2s; font-family: var(--sans);
        }
        input[type="text"]:focus, select:focus { border-color: var(--blue-main); box-shadow: 0 0 0 3px var(--blue-pale); }

        .mti-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .mti-option {
            background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 10px;
            cursor: pointer; text-align: left; transition: .2s; font-family: var(--sans);
        }
        .mti-option.active { border-color: var(--blue-main); background: var(--blue-pale); }
        .mti-option .code { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--blue-main); }
        .mti-option .desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }

        .sidebar-bitmap { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
        .bitmap-grid-mini { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; }
        .bit-cell {
            aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 7px; font-weight: 700; background: #fff;
            color: #cbd5e1; border: 1px solid #e2e8f0; transition: all .2s;
        }
        .bit-cell.active { background: var(--blue-main); color: white; border-color: var(--blue-main); }

        .actions-group { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

        .btn-execute {
            background: var(--blue-main); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px;
            font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2); font-family: var(--sans);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-execute:hover:not(:disabled) { transform: translateY(-1px); background: #1d4ed8; }
        .btn-execute:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-clear {
            background: transparent; color: var(--text-muted); border: 1px solid var(--border); width: 100%;
            padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all .2s; font-family: var(--sans);
        }
        .btn-clear:hover { background: #f1f5f9; color: var(--text-dark); }

        /* ── MAIN ── */
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .main-topbar {
            padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--white);
            display: flex; align-items: center; justify-content: space-between;
        }

        .topbar-left { display: flex; align-items: center; gap: 16px; }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
        }
        .status-badge.idle    { background: #f1f5f9; color: var(--text-muted); }
        .status-badge.loading { background: var(--warning-pale); color: var(--warning); }
        .status-badge.ok      { background: var(--success-pale); color: var(--success); }
        .status-badge.error   { background: #fff1f2; color: var(--danger); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-badge.loading .status-dot { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .btn-logout-top {
            display: flex; align-items: center; gap: 8px; padding: 7px 14px;
            background: #fff1f2; color: var(--danger); border: 1px solid #fecdd3; border-radius: 8px;
            font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--sans);
        }
        .btn-logout-top:hover { background: var(--danger); color: white; }

        .tab-content { flex: 1; overflow-y: auto; padding: 20px; }

        /* ── RESULT CARDS ── */
        .result-wrapper { display: flex; flex-direction: column; gap: 16px; }

        /* Code response banner */
        .code-banner {
            border-radius: 12px; padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .code-banner.aprobado { background: var(--success-pale); border: 1px solid #bbf7d0; }
        .code-banner.rechazado { background: #fff1f2; border: 1px solid #fecdd3; }
        .code-banner.neutro { background: var(--blue-pale); border: 1px solid #bfdbfe; }
        .code-icon { font-size: 24px; }
        .code-info h3 { font-size: 15px; font-weight: 700; }
        .code-info p { font-size: 12px; margin-top: 2px; opacity: 0.8; }

        /* DE Table */
        .result-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .result-header {
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .result-title { font-size: 13px; font-weight: 700; }
        .result-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

        .de-table { width: 100%; border-collapse: collapse; }
        .de-table th {
            background: #f8fafc; font-size: 10px; color: #94a3b8;
            text-align: left; padding: 10px 16px; text-transform: uppercase; letter-spacing: 0.5px;
            position: sticky; top: 0;
        }
        .de-table td { padding: 11px 16px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .de-table tr:last-child td { border-bottom: none; }
        .de-table tr:hover td { background: #fafafa; }

        .de-num { font-family: var(--mono); font-weight: 700; color: var(--blue-main); font-size: 11px; }
        .de-name { color: var(--text-muted); font-size: 11px; }
        .de-val { font-family: var(--mono); font-size: 12px; color: var(--text-dark); word-break: break-all; }

        .de-row-approved td { background: var(--success-pale) !important; }
        .de-row-rejected td { background: #fff1f2 !important; }
        .de-row-highlight td { background: var(--blue-pale) !important; }

        .badge-de {
            display: inline-block; padding: 2px 8px; border-radius: 20px;
            font-size: 10px; font-weight: 700; font-family: var(--mono);
        }
        .badge-approved { background: var(--success-pale); color: var(--success); }
        .badge-rejected { background: #fff1f2; color: var(--danger); }
        .badge-neutral  { background: var(--blue-pale); color: var(--blue-main); }

        /* Empty state */
        #emptyState { text-align: center; margin-top: 80px; color: var(--text-muted); }
        #emptyState .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

        /* Spinner */
        .spinner {
            width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="dot"></div>
        <h2>PARÁMETROS</h2>
    </div>

    <div class="sidebar-body">
        <div class="field">
            <span class="field-label">ID Transacción</span>
            <input type="text" id="idtx" placeholder="ID de la trama..." maxlength="64">
        </div>

        <div class="field">
            <span class="field-label">NODO</span>
            <select id="nodx">
                <option value="">— Seleccionar nodo —</option>
                <option value="0146">0146</option>
                <option value="0401">0401</option>
                <option value="0402">0402</option>
                <option value="0403">0403</option>
                <option value="0404">0404</option>
                <option value="0405">0405</option>
                <option value="0407">0407</option>
                <option value="0408">0408</option>
                <option value="0409">0409</option>
                <option value="0410">0410</option>
                <option value="0411">0411</option>
                <option value="0412">0412</option>
                <option value="0413">0413</option>
                <option value="MDES">MDES</option>
                <option value="Naiguata">Naiguata</option>
                <option value="Everct">Everct</option>
            </select>
        </div>

        <div class="field">
            <span class="field-label">Dirección (MODX)</span>
            <div class="mti-grid">
                <button class="mti-option active" id="modxINP" onclick="selectModx(this,'INP')">
                    <div class="code">INP</div>
                    <div class="desc">Entrada</div>
                </button>
                <button class="mti-option" id="modxOUT" onclick="selectModx(this,'OUT')">
                    <div class="code">OUT</div>
                    <div class="desc">Salida</div>
                </button>
            </div>
            <input type="hidden" id="modx" value="INP">
        </div>

        <div class="field">
            <span class="field-label">Bitmap activo</span>
            <div class="sidebar-bitmap">
                <div class="bitmap-grid-mini" id="bitmapGrid"></div>
            </div>
        </div>

        <div class="actions-group">
            <button class="btn-execute" id="btnEjecutar" onclick="ejecutar()">
                <span id="btnText">EJECUTAR</span>
            </button>
            <button class="btn-clear" onclick="limpiarParametros()">LIMPIAR PARÁMETROS</button>
        </div>
    </div>
</div>

<div class="main-view">
    <div class="main-topbar">
        <div class="topbar-left">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-muted);">
                Visual Admin › <span style="color: var(--text-dark);">Trama ISO 8583</span>
            </div>
            <span class="status-badge idle" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Listo</span>
            </span>
        </div>
        <button class="btn-logout-top" onclick="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
            Cerrar Sesión
        </button>
    </div>

    <div class="tab-content">
        <div id="emptyState">
            <div class="empty-icon">⚡</div>
            <p style="font-weight:600; margin-bottom:6px;">Esperando ejecución...</p>
            <p style="font-size:12px;">Completa los parámetros y presiona EJECUTAR</p>
        </div>

        <div id="resultContent" style="display:none">
            <div class="result-wrapper">

                <!-- Banner código de respuesta -->
                <div id="codeBanner" class="code-banner neutro">
                    <div class="code-icon" id="codeIcon">📋</div>
                    <div class="code-info">
                        <h3 id="codeTitle">Procesando...</h3>
                        <p id="codeDesc"></p>
                    </div>
                </div>

                <!-- Tabla DE -->
                <div class="result-card">
                    <div class="result-header">
                        <span class="result-title">Elementos de Datos ISO 8583</span>
                        <span class="result-meta" id="resultMeta"></span>
                    </div>
                    <table class="de-table">
                        <thead>
                            <tr>
                                <th style="width:80px">DE #</th>
                                <th>Nombre</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody id="deTableBody"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // ── Nombres descriptivos ISO 8583 ──
    const DE_NAMES = {
        2:  'PAN (Número de tarjeta)',
        3:  'Código de proceso',
        4:  'Monto transacción',
        5:  'Monto liquidación',
        6:  'Monto titular',
        7:  'Fecha/Hora transmisión',
        9:  'Factor conv. liquidación',
        11: 'STAN (Número de secuencia)',
        12: 'Hora local',
        13: 'Fecha local',
        14: 'Fecha expiración',
        15: 'Fecha liquidación',
        18: 'Código de comercio (MCC)',
        22: 'Modo entrada POS',
        23: 'Número secuencia tarjeta',
        24: 'NII / Código de función',
        25: 'Condición punto servicio',
        32: 'Cód. institución adquirente',
        35: 'Track 2',
        37: 'Referencia retrieval',
        38: 'Código autorización',
        39: 'Código de respuesta',
        41: 'Terminal ID',
        42: 'Merchant ID',
        43: 'Nombre/Ubicación comercio',
        48: 'Datos adicionales privados',
        49: 'Moneda transacción',
        52: 'PIN encriptado',
        55: 'Datos ICC / EMV',
        56: 'Moneda (símbolo)',
        57: 'Datos adicionales',
        60: 'Datos adicionales terminales',
        61: 'Datos adicionales POS',
        62: 'Datos adicionales intermediario',
        63: 'Datos adicionales financiero',
        90: 'Datos transacción original',
        95: 'Importes liquidación',
        100:'Cód. institución receptora',
        102:'Cuenta deudora',
        103:'Cuenta acreedora',
        126:'Datos privados',
    };

    // ── Códigos de respuesta ISO 8583 ──
    const RESP_CODES = {
        '00': { label: 'Aprobada', tipo: 'aprobado', icon: '✅' },
        '01': { label: 'Referir al emisor', tipo: 'rechazado', icon: '⚠️' },
        '05': { label: 'No honrar', tipo: 'rechazado', icon: '❌' },
        '12': { label: 'Transacción inválida', tipo: 'rechazado', icon: '❌' },
        '13': { label: 'Monto inválido', tipo: 'rechazado', icon: '❌' },
        '14': { label: 'Número tarjeta inválido', tipo: 'rechazado', icon: '❌' },
        '30': { label: 'Error de formato', tipo: 'rechazado', icon: '❌' },
        '51': { label: 'Fondos insuficientes', tipo: 'rechazado', icon: '❌' },
        '54': { label: 'Tarjeta expirada', tipo: 'rechazado', icon: '❌' },
        '55': { label: 'PIN incorrecto', tipo: 'rechazado', icon: '❌' },
        '57': { label: 'Transacción no permitida', tipo: 'rechazado', icon: '❌' },
        '58': { label: 'Terminal no permitida', tipo: 'rechazado', icon: '❌' },
        '62': { label: 'Tarjeta restringida', tipo: 'rechazado', icon: '❌' },
        '91': { label: 'Emisor no disponible', tipo: 'rechazado', icon: '🔌' },
        '96': { label: 'Error del sistema', tipo: 'rechazado', icon: '⚠️' },
    };

    // ── Bitmap ──
    function initBitmap(size = 64) {
        const grid = document.getElementById('bitmapGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= size; i++) {
            grid.insertAdjacentHTML('beforeend', `<div class="bit-cell" id="bit-${i}">${i}</div>`);
        }
    }

    function markBits(nums) {
        for (let i = 1; i <= 64; i++) {
            const b = document.getElementById(`bit-${i}`);
            if (b) b.classList.remove('active');
        }
        nums.forEach(n => {
            const b = document.getElementById(`bit-${n}`);
            if (b) b.classList.add('active');
        });
    }

    function selectModx(btn, val) {
        document.getElementById('modxINP').classList.remove('active');
        document.getElementById('modxOUT').classList.remove('active');
        btn.classList.add('active');
        document.getElementById('modx').value = val;
    }

    function setStatus(state, text) {
        const badge = document.getElementById('statusBadge');
        badge.className = `status-badge ${state}`;
        document.getElementById('statusText').textContent = text;
    }

    // ── Tipos de mensaje ISO 8583 ──
    const MSG_TYPES = {
        '0100': 'Autorización (Solicitud)',
        '0110': 'Autorización (Respuesta)',
        '0200': 'Compra / Débito (Solicitud)',
        '0210': 'Compra / Débito (Respuesta)',
        '0220': 'Compra (Aviso)',
        '0400': 'Reverso (Solicitud)',
        '0410': 'Reverso (Respuesta)',
        '0420': 'Reverso (Aviso)',
        '0800': 'Red Management (Solicitud)',
        '0810': 'Red Management (Respuesta)',
    };

    // ── Parsear respuesta AS/400 ──
    function parsearRespuesta(apiData) {
        let des = [];
        let code = null;
        let msgtyp = null;
        let sinRespuesta = false;

        code = apiData.code || null;
        msgtyp = apiData.msgtyp || null;

        // Detectar OUT vacío
        if (code === 'ERR' || !apiData.data ||
            (typeof apiData.data === 'object' && Object.keys(apiData.data).length === 0)) {
            sinRespuesta = true;
            return { code, des, msgtyp, sinRespuesta };
        }

        // Extraer data
        let dataObj = null;
        if (typeof apiData.data === 'string') {
            try { dataObj = JSON.parse(apiData.data); } catch { dataObj = null; }
        } else if (typeof apiData.data === 'object') {
            dataObj = apiData.data;
        }

        if (dataObj) {
            Object.entries(dataObj).forEach(([key, val]) => {
                const match = key.match(/DE[_\(]?(\d+)\)?/i);
                if (match) {
                    const num = parseInt(match[1]);
                    des.push({ num, key, valor: val });
                    // Capturar MSGTYP si viene como DE
                    if (key === 'MSGTYP' || key === 'DE(000)') msgtyp = val?.trim();
                } else if (key === 'MSGTYP') {
                    msgtyp = val?.trim();
                } else {
                    des.push({ num: null, key, valor: val });
                }
            });
            des.sort((a, b) => (a.num || 999) - (b.num || 999));
        }

        return { code, des, msgtyp, sinRespuesta };
    }

    // ── Renderizar ──
    function renderizar(apiData) {
        const { code, des, msgtyp, sinRespuesta } = parsearRespuesta(apiData);

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultContent').style.display = 'block';

        const banner = document.getElementById('codeBanner');

        // ── Sin respuesta OUT ──
        if (sinRespuesta) {
            banner.className = 'code-banner neutro';
            document.getElementById('codeIcon').textContent = '⏳';
            document.getElementById('codeTitle').textContent = 'Sin mensaje de respuesta';
            document.getElementById('codeDesc').textContent = 'Esta transacción no tiene trama de salida (OUT) registrada en el sistema';
            document.getElementById('resultMeta').textContent = '0 DEs';
            document.getElementById('deTableBody').innerHTML = `
                <tr>
                    <td colspan="3" style="text-align:center; padding:40px; color:var(--text-muted); font-size:13px;">
                        ⏳ No se encontró mensaje de respuesta para esta transacción
                    </td>
                </tr>`;
            setStatus('idle', 'Sin respuesta OUT');
            markBits([]);
            return;
        }

        // ── Con respuesta ──
        const codeInfo = RESP_CODES[code] || { label: `Código ${code || 'desconocido'}`, tipo: 'neutro', icon: '📋' };
        banner.className = `code-banner ${codeInfo.tipo}`;
        document.getElementById('codeIcon').textContent = codeInfo.icon;

        // Título con tipo de mensaje
        const msgLabel = msgtyp && MSG_TYPES[msgtyp] ? `[${msgtyp}] ${MSG_TYPES[msgtyp]}` : (msgtyp ? `Mensaje: ${msgtyp}` : '');
        document.getElementById('codeTitle').textContent = `${code ? 'DE(039): ' + code + ' — ' : ''}${codeInfo.label}`;
        document.getElementById('codeDesc').textContent = `${msgLabel ? msgLabel + ' · ' : ''}${des.length} elementos de datos recibidos`;

        document.getElementById('resultMeta').textContent = `${des.length} DEs`;

        const tbody = document.getElementById('deTableBody');
        tbody.innerHTML = '';
        const bits = [];

        des.forEach(({ num, key, valor }) => {
            if (num) bits.push(num);
            const nombre = num && DE_NAMES[num] ? DE_NAMES[num] : key;
            let rowClass = '';
            let badgeHtml = '';
            let extraInfo = '';

            if (num === 39) {
                const resp = RESP_CODES[valor?.trim()];
                if (resp) {
                    rowClass = resp.tipo === 'aprobado' ? 'de-row-approved' : 'de-row-rejected';
                    badgeHtml = `<span class="badge-de ${resp.tipo === 'aprobado' ? 'badge-approved' : 'badge-rejected'}">${resp.icon} ${resp.label}</span>`;
                }
            } else if (num === 3) {
                rowClass = 'de-row-highlight';
                if (valor && valor.length >= 6) {
                    const txType  = valor.substring(0,2);
                    const fromAcc = valor.substring(2,4);
                    const toAcc   = valor.substring(4,6);
                    const txNames  = {'00':'Compra','01':'Retiro cajero','09':'Compra con cashback','20':'Reverso','28':'Pago de servicio','30':'Consulta saldo'};
                    const accNames = {'00':'Cuenta principal','10':'Ahorro','20':'Corriente','30':'Crédito'};
                    const txLabel   = txNames[txType]  || 'Tipo ' + txType;
                    const fromLabel = accNames[fromAcc] || 'Origen ' + fromAcc;
                    const toLabel   = accNames[toAcc]   || 'Destino ' + toAcc;
                    extraInfo = '<br><small style="color:var(--text-muted); font-size:11px;">🔄 ' + txLabel + ' &nbsp;|&nbsp; 📤 ' + fromLabel + ' &nbsp;→&nbsp; 📥 ' + toLabel + '</small>';
                }
            } else if (num === 4 || num === 11) {
                rowClass = 'de-row-highlight';
            }

            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td><span class="de-num">DE(${num !== null ? String(num).padStart(3,'0') : key})</span></td>
                    <td><span class="de-name">${nombre}</span></td>
                    <td>
                        <span class="de-val">${valor || ''}</span>${extraInfo}
                        ${badgeHtml}
                    </td>
                </tr>`;
        });

        markBits(bits);

        if (code === '00') setStatus('ok', 'Aprobada');
        else if (code && code !== 'ERR') setStatus('error', `Rechazada (${code})`);
        else setStatus('idle', 'Respuesta recibida');
    }

    // ── EJECUTAR ──
    async function ejecutar() {
        const idtx = document.getElementById('idtx').value.trim();
        const nodx = document.getElementById('nodx').value;
        const modx = document.getElementById('modx').value;

        if (!idtx || !nodx) return alert("Faltan parámetros");

        const btn = document.getElementById('btnEjecutar');
        btn.disabled = true;
        document.getElementById('btnText').innerHTML = '<div class="spinner"></div>';
        setStatus('loading', 'Consultando...');

        try {
            const res = await fetch('/api/ejecutar-trarput', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idtx, nodx, modx })
            });

            const data = await res.json();
            renderizar(data);

        } catch (e) {
            setStatus('error', 'Error de conexión');
            alert("Error de comunicación: " + e.message);
        } finally {
            btn.disabled = false;
            document.getElementById('btnText').textContent = 'EJECUTAR';
        }
    }

    // ── Limpiar ──
    function limpiarParametros() {
        document.getElementById('idtx').value = '';
        document.getElementById('nodx').value = '';
        markBits([]);
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('resultContent').style.display = 'none';
        setStatus('idle', 'Listo');
    }

    function cerrarSesion() {
        if (confirm("¿Deseas cerrar la sesión?")) {
            localStorage.removeItem('usuarioLogueado');
            window.location.href = 'login.html';
        }
    }

    document.addEventListener('DOMContentLoaded', () => initBitmap(64));
</script>
</body>
</html>
