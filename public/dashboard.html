<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Admin — Terminal ISO 8583</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-main:   #2563eb;
            --blue-pale:   #eff6ff;
            --text-dark:   #1e1b4b;
            --text-muted:  #64748b;
            --border:      #e2e8f0;
            --bg:          #f8f7ff;
            --white:       #ffffff;
            --sans:        'Sora', sans-serif;
            --mono:        'IBM Plex Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            min-width: 360px;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-header .dot { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: var(--blue-main); 
            box-shadow: 0 0 0 4px var(--blue-pale);
        }
        .sidebar-header h2 { 
            font-size: 14px; font-weight: 700; color: var(--text-dark); 
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .sidebar-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; flex: 1; }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .field-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input[type="text"], select {
            width: 100%;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-dark);
            font-family: var(--sans);
            font-size: 13px;
            padding: 10px 14px;
            outline: none;
            transition: all .2s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--blue-main);
            box-shadow: 0 0 0 4px var(--blue-pale);
        }

        .mti-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .mti-option {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; cursor: pointer;
            transition: .2s; text-align: left;
        }
        .mti-option:hover { border-color: #cbd5e1; background: var(--bg); }
        .mti-option.active { border-color: var(--blue-main); background: var(--blue-pale); }
        .mti-option .code { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--blue-main); }
        .mti-option .desc { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

        .sidebar-bitmap {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            max-height: 250px; /* Limitamos altura para scroll si es de 128 bits */
            overflow-y: auto;
        }
        .bitmap-grid-mini { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 3px; 
        }
        .bit-cell {
            aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 8px; font-weight: 700; background: #fff; color: #cbd5e1;
            border: 1px solid #e2e8f0; transition: .2s;
        }
        .bit-cell.active { background: var(--blue-main); color: white; border-color: var(--blue-main); }

        .btn-execute {
            background: var(--blue-main);
            color: white; border: none; width: 100%;
            padding: 16px; border-radius: 12px;
            font-family: var(--sans); font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all .2s;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-execute:hover { transform: translateY(-1px); background: #1d4ed8; }
        .btn-clear {
            background: none; border: 1px solid var(--border); color: var(--text-muted);
            width: 100%; padding: 10px; border-radius: 10px;
            font-family: var(--sans); font-size: 12px; font-weight: 600; cursor: pointer; transition: .2s;
        }

        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-topbar { padding: 18px 30px; border-bottom: 1px solid var(--border); background: var(--white); display: flex; align-items: center; }
        .tabs { display: flex; gap: 8px; padding: 16px 30px 0; background: var(--white); border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 10px 10px 0 0; transition: .2s; position: relative; bottom: -1px; }
        .tab.active { color: var(--blue-main); background: var(--bg); border: 1px solid var(--border); border-bottom: 1px solid var(--bg); }
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 24px; }
        .tab-content.active { display: block; }

        .result-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 24px; overflow: hidden; }
        .result-card-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        .de-table { width: 100%; border-collapse: collapse; }
        .de-table th { background: #f8fafc; font-size: 10px; color: #94a3b8; text-align: left; padding: 12px 20px; }
        .de-table td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
        
        .de-table td { max-width: 300px; word-break: break-all; vertical-align: top; }
        .de-row-critical { background-color: var(--blue-pale) !important; font-weight: 600; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="dot"></div>
        <h2>PARAMETROS</h2>
    </div>

    <div class="sidebar-body">
        <div class="field">
            <span class="field-label">ID Transacción</span>
            <input type="text" id="idtx" placeholder="7177A006A8AC..." maxlength="32">
        </div>

        <div class="field">
            <span class="field-label">NODO</span>
            <select id="nodx" onchange="onNodoChange()">
                <option value="">— Seleccionar nodo —</option>
                <option value="0146">0146</option>
                <option value="0401">0401</option>
                <option value="0402">0402</option>
                <option value="0403">0403</option>
                <option value="0404">0404</option>
                <option value="0405">0405</option>
                <option value="0407">0407</option>
                <option value="0408">0408</option>
                <option value="0409">0409</option>
                <option value="0410">0410</option>
                <option value="0411">0411</option>
                <option value="0412">0412</option>
                <option value="0413">0413</option>
                <option value="MDES">MDES</option>
                <option value="EVERTC">EVERTC</option>
                <option value="NAIGUATA">NAIGUATA</option>
            </select>
        </div>

        <div style="display:flex; flex-direction:column; gap:20px; margin-top:auto;">
            <div class="field">
                <span class="field-label">Dirección (MODX)</span>
                <div class="mti-grid">
                    <button class="mti-option active" id="modxINP" onclick="selectModx(this,'INP')">
                        <div class="code">INP</div>
                        <div class="desc">Entrada (Req)</div>
                    </button>
                    <button class="mti-option" id="modxOUT" onclick="selectModx(this,'OUT')">
                        <div class="code">OUT</div>
                        <div class="desc">Salida (Res)</div>
                    </button>
                </div>
                <input type="hidden" id="modx" value="INP">
            </div>

            <div class="field">
                <span class="field-label">Tipo de Mensaje (MTI)</span>
                <div class="mti-grid">
                    <button class="mti-option active" id="mti0200" onclick="selectMTI(this,'0200')">
                        <div class="code">0200</div>
                        <div class="desc">Auth Request</div>
                    </button>
                    <button class="mti-option" id="mti0210" onclick="selectMTI(this,'0210')">
                        <div class="code">0210</div>
                        <div class="desc">Auth Response</div>
                    </button>
                </div>
                <input type="hidden" id="mtiVal" value="0200">
            </div>

            <div class="field">
                <span class="field-label">Bitmap (Campos Activos)</span>
                <div class="sidebar-bitmap" id="bitmapScroll">
                    <div class="bitmap-grid-mini" id="bitmapGrid"></div>
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:8px;">
                <button class="btn-execute" id="btnEjecutar" onclick="ejecutar()">
                    <span>▶ EJECUTAR TRARPUT</span>
                    <span id="nodoBtnLabel" style="opacity:.7"></span>
                </button>
                <button class="btn-clear" onclick="limpiar()">✕ Limpiar pantalla</button>
            </div>
        </div>
    </div>
</div>

<div class="main-view">
    <div class="main-topbar">
        <div class="breadcrumb">
            <span>Visual Admin › Trama de mensaje</span>
            <span class="active" id="bcActive"></span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('resultado',this)">📋 Resultado</div>
    </div>

    <div class="tab-content active" id="tab-resultado">
        <div id="emptyState" style="padding: 40px; text-align: center; color: var(--text-muted);">
            <p>Ingresa los parámetros</p>
        </div>
        <div id="resultContent" style="display:none">
            <div class="result-card">
                <div class="result-card-header"><h3>Data Elements (ISO 8583)</h3></div>
                <div class="result-card-body">
                    <table class="de-table">
                        <thead><tr><th>DE#</th><th>Nombre</th><th>Tipo</th><th>Valor</th></tr></thead>
                        <tbody id="deTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let mtiActual = '0200';

    // Generar Bitmap con capacidad de 64 o 128
    function initBitmap(size = 64) {
        const grid = document.getElementById('bitmapGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= size; i++) {
            grid.insertAdjacentHTML('beforeend', `<div class="bit-cell" id="bit-${i}">${i}</div>`);
        }
    }

    function limpiar() {
        document.getElementById('idtx').value = '';
        document.getElementById('nodx').value = '';
        document.getElementById('bcActive').textContent = '';
        onNodoChange();
        selectModx(document.getElementById('modxINP'), 'INP');
        selectMTI(document.getElementById('mti0200'), '0200');
        
        initBitmap(64); // Regresamos a 64 bits por defecto al limpiar
        
        document.getElementById('deTableBody').innerHTML = '';
        document.getElementById('resultContent').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
    }

    function switchTab(name, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    function selectMTI(btn, code) {
        document.getElementById('mti0200').classList.remove('active');
        document.getElementById('mti0210').classList.remove('active');
        btn.classList.add('active');
        mtiActual = code;
        document.getElementById('mtiVal').value = code;
    }

    function selectModx(btn, val) {
        document.getElementById('modxINP').classList.remove('active');
        document.getElementById('modxOUT').classList.remove('active');
        btn.classList.add('active');
        document.getElementById('modx').value = val;
    }

    function onNodoChange() {
        const val = document.getElementById('nodx').value;
        document.getElementById('nodoBtnLabel').textContent = val ? `(${val})` : '';
        document.getElementById('bcActive').textContent = ''; 
    }

    // --- DETECCIÓN AUTOMÁTICA DE BITMAP ---
    function renderBitmap(activeDEs) {
        // Si el bit 1 está presente o hay algún DE por encima de 64, dibujamos 128
        const maxDE = Math.max(...activeDEs);
        const requiresSecondary = activeDEs.includes(1) || maxDE > 64;
        
        initBitmap(requiresSecondary ? 128 : 64);

        activeDEs.forEach(num => {
            const cell = document.getElementById(`bit-${num}`);
            if (cell) cell.classList.add('active');
        });
    }

    async function ejecutar() {
        const idTransaccion = document.getElementById('idtx').value;
        const nodo = document.getElementById('nodx').value;
        const direccion = document.getElementById('modx').value;

        if (!idTransaccion || !nodo) {
            alert("Por favor rellene el ID y el Nodo");
            return;
        }

        const miJason = {
            "id_transaccion": idTransaccion,
            "nodo": nodo,
            "idx": direccion,
            "mti": mtiActual
        };

        try {
            const respuesta = await fetch('http://localhost:3001/api/ejecutar-trarput', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(miJason)
            });
            
            const resultado = await respuesta.json();

            if (resultado.ok && resultado.des) {
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('resultContent').style.display = 'block';
                
                // Extraemos los números de los DE recibidos
                const deNums = resultado.des.map(d => parseInt(d.num));
                
                // Renderizamos bitmap con detección automática
                renderBitmap(deNums);

                const tbody = document.getElementById('deTableBody');
                tbody.innerHTML = '';
                
                resultado.des.forEach(de => {
                    const isCritical = (de.num === 3 || de.num === 39) ? 'class="de-row-critical"' : '';
                    tbody.innerHTML += `
                        <tr ${isCritical}>
                            <td><b>DE ${de.num}</b></td>
                            <td>${de.nombre || 'N/A'}</td>
                            <td style="color:var(--text-muted)">${de.tipo || 'ans'}</td>
                            <td style="font-family:var(--mono); color: var(--blue-main)">${de.valor}</td>
                        </tr>`;
                });
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Error de comunicación con el backend.");
        }
    }

    document.addEventListener('DOMContentLoaded', () => initBitmap(64));
</script>
</body>
</html>
